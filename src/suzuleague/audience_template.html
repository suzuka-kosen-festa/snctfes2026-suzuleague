<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0E5C5C">
<meta name="robots" content="noindex">
<title>スズリーグ 観客参加</title>
<style>
  :root {
    --bg: #0E1416;
    --panel: #182124;
    --panel-2: #202B2E;
    --ink: #EAF0EE;
    --ink-soft: #9FB0AE;
    --ink-faint: #6E8180;
    --accent: #FF6B9D;
    --teal: #4FB3AC;
    --amber: #F2B455;
    --line: #2B383A;
    --f-body: "Hiragino Sans", "Yu Gothic", "Noto Sans JP", system-ui, sans-serif;
    --f-num: ui-monospace, "SF Mono", Menlo, monospace;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--f-body);
    line-height: 1.7;
    overscroll-behavior: none;
  }

  body {
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top) 1rem calc(env(safe-area-inset-bottom) + 1rem);
  }

  /* ---- ヘッダ ---- */

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    padding: 0.9rem 0;
    border-bottom: 1px solid var(--line);
  }

  .brand {
    font-weight: 700;
    letter-spacing: 0.04em;
    font-size: 0.95rem;
  }

  .conn {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.72rem;
    color: var(--ink-faint);
    font-family: var(--f-num);
  }

  .dot {
    width: 0.5rem;
    height: 0.5rem;
    border-radius: 50%;
    background: var(--ink-faint);
  }

  .conn[data-state="open"] .dot { background: var(--teal); }
  .conn[data-state="lost"] .dot { background: var(--accent); }

  /* ---- 自分のバルーン ---- */

  .mine {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 0.75rem;
    padding: 0.9rem 0 1rem;
    border-bottom: 1px solid var(--line);
  }

  .mine .label {
    font-size: 0.78rem;
    color: var(--ink-soft);
  }

  .mine .value {
    font-family: var(--f-num);
    font-size: 2rem;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }

  .mine .value.is-out { color: var(--accent); }

  .mine .team {
    font-size: 0.72rem;
    color: var(--ink-faint);
    font-family: var(--f-num);
  }

  /* ---- 本体 ---- */

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 1.25rem;
    padding: 1.5rem 0;
  }

  .stage-label {
    font-family: var(--f-num);
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--teal);
  }

  .question {
    font-size: 1.3rem;
    font-weight: 700;
    line-height: 1.6;
    text-wrap: balance;
    margin: 0;
  }

  .hint {
    font-size: 0.88rem;
    color: var(--ink-soft);
    margin: 0;
  }

  /* ---- 回答入力 ---- */

  .answer-box {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 0.75rem;
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .readout {
    text-align: center;
    font-family: var(--f-num);
    font-size: 3.5rem;
    font-weight: 600;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    color: var(--amber);
  }

  .readout small { font-size: 1.5rem; opacity: 0.7; }

  input[type="range"] {
    width: 100%;
    height: 2.5rem;
    -webkit-appearance: none;
    appearance: none;
    background: transparent;
  }

  input[type="range"]::-webkit-slider-runnable-track {
    height: 0.4rem;
    border-radius: 999px;
    background: linear-gradient(to right, var(--amber) var(--pct, 50%), var(--panel-2) var(--pct, 50%));
  }

  input[type="range"]::-moz-range-track {
    height: 0.4rem;
    border-radius: 999px;
    background: var(--panel-2);
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 2rem;
    height: 2rem;
    margin-top: -0.8rem;
    border-radius: 50%;
    background: var(--amber);
    border: 3px solid var(--bg);
  }

  input[type="range"]::-moz-range-thumb {
    width: 2rem;
    height: 2rem;
    border-radius: 50%;
    background: var(--amber);
    border: 3px solid var(--bg);
  }

  .nudge {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.5rem;
  }

  button {
    font-family: inherit;
    font-size: 1rem;
    color: var(--ink);
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 0.5rem;
    padding: 0.7rem 0;
    cursor: pointer;
    touch-action: manipulation;
  }

  button:active { background: var(--line); }

  button:focus-visible {
    outline: 2px solid var(--amber);
    outline-offset: 2px;
  }

  .lock {
    width: 100%;
    background: var(--teal);
    color: #05201F;
    font-weight: 700;
    border-color: var(--teal);
    padding: 0.9rem 0;
  }

  .lock[disabled] {
    background: var(--panel-2);
    color: var(--ink-faint);
    border-color: var(--line);
    font-weight: 400;
  }

  /* ---- 結果 ---- */

  .result {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 0.75rem;
    overflow: hidden;
  }

  .result-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 1rem;
    padding: 0.85rem 1.1rem;
    border-bottom: 1px solid var(--line);
  }

  .result-row:last-child { border-bottom: none; }

  .result-row .k { font-size: 0.85rem; color: var(--ink-soft); }

  .result-row .v {
    font-family: var(--f-num);
    font-size: 1.4rem;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  .result-row.is-correct .v { color: var(--teal); }
  .result-row.is-damage .v { color: var(--accent); }
  .result-row.is-perfect { background: rgba(79, 179, 172, 0.12); }

  .verdict {
    text-align: center;
    padding: 1rem;
    font-weight: 700;
    font-size: 1.05rem;
  }

  /* ---- 待機・情報表示 ---- */

  .idle {
    text-align: center;
    padding: 2rem 0;
    color: var(--ink-soft);
  }

  .idle .big {
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 0.5rem;
  }

  footer {
    padding-top: 1rem;
    border-top: 1px solid var(--line);
    font-size: 0.72rem;
    color: var(--ink-faint);
    text-align: center;
  }

  .hidden { display: none !important; }

  @media (prefers-reduced-motion: no-preference) {
    .readout, .mine .value { transition: color 0.2s ease; }
  }
</style>
</head>
<body>

<header>
  <span class="brand">スズリーグ</span>
  <span class="conn" id="conn" data-state="connecting">
    <span class="dot"></span><span id="conn-text">接続中…</span>
  </span>
</header>

<div class="mine">
  <div>
    <div class="label">あなたのバルーン</div>
    <div class="team" id="team-label">開始前</div>
  </div>
  <div class="value" id="my-balloons">100</div>
</div>

<main id="main">
  <div class="idle" id="view-idle">
    <div class="big">まもなく開始します</div>
    <div>ステージの進行に合わせて、この画面が切り替わります。<br>そのままお待ちください。</div>
  </div>

  <div class="hidden" id="view-question">
    <div class="stage-label" id="q-meta">第1問</div>
    <p class="question" id="q-text">—</p>
    <p class="hint" id="q-hint">まもなく回答時間になります。</p>
  </div>

  <div class="hidden" id="view-answer">
    <div class="stage-label" id="a-meta">回答時間</div>
    <p class="question" id="a-text">—</p>
    <div class="answer-box">
      <div class="readout"><span id="readout-num">50</span><small>%</small></div>
      <input type="range" id="slider" min="0" max="100" value="50" step="1"
             aria-label="あなたの予想（パーセント）">
      <div class="nudge">
        <button type="button" data-delta="-10">−10</button>
        <button type="button" data-delta="-1">−1</button>
        <button type="button" data-delta="1">+1</button>
        <button type="button" data-delta="10">+10</button>
      </div>
      <button type="button" class="lock" id="lock-btn">この数字で決定</button>
    </div>
    <p class="hint" id="a-hint">スライダーか＋−ボタンで数字を合わせてください。</p>
  </div>

  <div class="hidden" id="view-reveal">
    <div class="stage-label">正解発表</div>
    <p class="question" id="r-text">—</p>
    <div class="result" id="r-box">
      <div class="result-row is-correct">
        <span class="k">正解</span><span class="v" id="r-correct">—</span>
      </div>
      <div class="result-row">
        <span class="k">あなたの予想</span><span class="v" id="r-mine">—</span>
      </div>
      <div class="result-row is-damage">
        <span class="k">割れたバルーン</span><span class="v" id="r-damage">—</span>
      </div>
      <div class="verdict" id="r-verdict"></div>
    </div>
  </div>

  <div class="hidden" id="view-message">
    <div class="idle">
      <div class="big" id="m-title">—</div>
      <div id="m-body"></div>
    </div>
  </div>
</main>

<footer>
  鈴鹿高専 高専祭2026 ステージイベント「スズリーグ」<br>
  回答はこの端末の中だけで採点しています。送信はしていません。
</footer>

<script>
(function () {
  "use strict";

  // 問題文は uv run python -m suzuleague.questions --audience-json で生成して差し替える。
  // 正解はここには持たない（先に見えてしまうため）。正解発表時に P2S_CORRECT で届く。
  var QUESTIONS = __QUESTIONS__;

  var ROOM = "__ROOM__";
  var INITIAL_BALLOONS = 100;

  // engine.State と対応（docs/game-rules.md の遷移図）
  var S = {
    IDLE: 0, TEAM_INTRO: 1, QUESTION: 2, ANSWERING: 3, REVEAL: 4,
    ROUND_RESULT: 5, TEAM_RESULT: 6, EXHIBITION_ANSWERING: 7, FINAL_RESULT: 8
  };

  var el = function (id) { return document.getElementById(id); };
  var views = ["view-idle", "view-question", "view-answer", "view-reveal", "view-message"];

  var state = {
    vars: {},          // 受信したP2S_*の生値
    answer: 50,        // スライダーの現在値
    locked: null,      // 決定した回答（未決定はnull）
    balloons: INITIAL_BALLOONS,
    team: 0,
    scoredSeq: null,   // 採点済みのP2S_SEQ（二重採点を防ぐ）
    lastState: null
  };

  // ---- 表示の切り替え ------------------------------------------------

  function show(which) {
    views.forEach(function (v) {
      el(v).classList.toggle("hidden", v !== which);
    });
  }

  function setConn(kind, text) {
    var c = el("conn");
    c.setAttribute("data-state", kind);
    el("conn-text").textContent = text;
  }

  function num(name) {
    var v = state.vars[name];
    if (v === undefined || v === null || v === "") return null;
    var n = Number(v);
    return isNaN(n) ? null : Math.round(n);
  }

  function questionText(qid) {
    return QUESTIONS[String(qid)] || "（問題文の取得に失敗しました）";
  }

  function metaLabel() {
    var t = num("P2S_TEAM") || 0;
    var r = num("P2S_ROUND") || 0;
    if (!t) return "";
    return "チーム" + t + " ・ 第" + r + "問";
  }

  function renderBalloons() {
    var v = el("my-balloons");
    v.textContent = state.balloons;
    v.classList.toggle("is-out", state.balloons <= 0);
    var t = num("P2S_TEAM") || 0;
    el("team-label").textContent = t ? "チーム" + t + " と同じ問題に挑戦中" : "開始前";
  }

  function setSlider(v) {
    v = Math.max(0, Math.min(100, Math.round(v)));
    state.answer = v;
    el("slider").value = v;
    el("slider").style.setProperty("--pct", v + "%");
    el("readout-num").textContent = v;
  }

  // ---- 状態ごとの描画 ------------------------------------------------

  function render() {
    var st = num("P2S_STATE");
    var qid = num("P2S_QID") || 0;
    var team = num("P2S_TEAM") || 0;

    // チームが変わったら自分のバルーンをリセットする。
    // 挑戦者と同じ条件（1チーム5問・100スタート）で比べられるようにするため。
    if (team !== state.team) {
      state.team = team;
      state.balloons = INITIAL_BALLOONS;
      state.locked = null;
    }

    renderBalloons();

    if (st === null) { show("view-idle"); return; }

    switch (st) {
      case S.QUESTION:
        el("q-meta").textContent = metaLabel();
        el("q-text").textContent = questionText(qid);
        el("q-hint").textContent = "まもなく回答時間になります。予想を考えておいてください。";
        show("view-question");
        break;

      case S.ANSWERING:
      case S.EXHIBITION_ANSWERING:
        el("a-meta").textContent = metaLabel() +
          (st === S.EXHIBITION_ANSWERING ? " ・ エキシビション" : "");
        el("a-text").textContent = questionText(qid);
        if (state.locked === null) {
          el("lock-btn").disabled = false;
          el("lock-btn").textContent = "この数字で決定";
          el("a-hint").textContent = "スライダーか＋−ボタンで数字を合わせてください。";
        }
        show("view-answer");
        break;

      case S.REVEAL:
      case S.ROUND_RESULT:
        renderReveal(qid);
        break;

      case S.TEAM_INTRO:
        el("m-title").textContent = "チーム" + team + " の登場です";
        el("m-body").textContent = "あなたのバルーンも100個に戻りました。同じ問題に挑戦できます。";
        show("view-message");
        break;

      case S.TEAM_RESULT:
        el("m-title").textContent = state.balloons > 0
          ? "あなたはクリア！ 残り " + state.balloons + " 個"
          : "あなたのバルーンは尽きました";
        el("m-body").textContent = "ステージの結果発表をご覧ください。";
        show("view-message");
        break;

      case S.FINAL_RESULT:
        el("m-title").textContent = "全チーム終了！";
        el("m-body").textContent = "ご参加ありがとうございました。表彰式をお楽しみください。";
        show("view-message");
        break;

      default:
        show("view-idle");
    }
  }

  function renderReveal(qid) {
    var correct = num("P2S_CORRECT");
    var seq = num("P2S_SEQ");

    // 正解が未公開（-1）のあいだは待機表示のまま
    if (correct === null || correct < 0) {
      el("m-title").textContent = "正解は…？";
      el("m-body").textContent = "ステージの発表をお待ちください。";
      show("view-message");
      return;
    }

    if (state.locked === null) {
      el("m-title").textContent = "正解は " + correct + "%";
      el("m-body").textContent = "今回は回答が間に合いませんでした。次の問題からどうぞ。";
      show("view-message");
      return;
    }

    var damage = Math.abs(correct - state.locked);

    // 同じラウンドで二重に減点しないよう、採点は1回だけ
    if (state.scoredSeq !== seq) {
      state.scoredSeq = seq;
      state.balloons = Math.max(0, state.balloons - damage);
      renderBalloons();
      save();
    }

    el("r-text").textContent = questionText(qid);
    el("r-correct").textContent = correct + "%";
    el("r-mine").textContent = state.locked + "%";
    el("r-damage").textContent = damage === 0 ? "0（無傷！）" : "−" + damage;
    el("r-box").querySelector(".is-perfect") &&
      el("r-box").querySelector(".is-perfect").classList.remove("is-perfect");
    if (damage === 0) el("r-box").firstElementChild.classList.add("is-perfect");

    el("r-verdict").textContent = damage === 0
      ? "ぴったり正解！"
      : (state.balloons > 0
          ? "残り " + state.balloons + " 個"
          : "バルーンが尽きました");
    show("view-reveal");
  }

  // ---- 回答の確定 ----------------------------------------------------

  function lockAnswer() {
    state.locked = state.answer;
    el("lock-btn").disabled = true;
    el("lock-btn").textContent = state.locked + "% で決定しました";
    el("a-hint").textContent = "正解発表をお待ちください。決定後の変更はできません。";
    save();
  }

  // ---- 途中リロードへの備え -------------------------------------------

  function save() {
    try {
      sessionStorage.setItem("suzuleague", JSON.stringify({
        balloons: state.balloons, team: state.team,
        locked: state.locked, scoredSeq: state.scoredSeq
      }));
    } catch (e) { /* プライベートモード等では保存しない */ }
  }

  function restore() {
    try {
      var raw = sessionStorage.getItem("suzuleague");
      if (!raw) return;
      var s = JSON.parse(raw);
      if (typeof s.balloons === "number") state.balloons = s.balloons;
      if (typeof s.team === "number") state.team = s.team;
      if (typeof s.locked === "number") state.locked = s.locked;
      if (typeof s.scoredSeq === "number") state.scoredSeq = s.scoredSeq;
    } catch (e) { /* 壊れていたら初期値のまま */ }
  }

  // ---- cloud サーバへの接続 -------------------------------------------
  // 観客は読むだけ。S2P_* には絶対に書き込まない（挑戦者の回答として
  // 採点されてしまうため）。docs/protocol.md の「観客用クライアント」参照。

  var ws = null;
  var retry = 0;

  function connect() {
    var proto = location.protocol === "https:" ? "wss:" : "ws:";
    var url = proto + "//" + location.host;

    try {
      ws = new WebSocket(url);
    } catch (e) {
      scheduleReconnect();
      return;
    }

    ws.onopen = function () {
      retry = 0;
      setConn("open", "接続中");
      ws.send(JSON.stringify({
        method: "handshake",
        project_id: ROOM,
        user: "audience" + Math.floor(Math.random() * 1000000)
      }));
    };

    ws.onmessage = function (ev) {
      var changed = false;
      String(ev.data).split("\n").forEach(function (line) {
        if (!line) return;
        var msg;
        try { msg = JSON.parse(line); } catch (e) { return; }
        if (msg.method !== "set") return;
        var name = String(msg.name || "").replace(/^☁\s*/, "");
        state.vars[name] = msg.value;
        changed = true;
      });
      if (changed) render();
    };

    ws.onclose = function () {
      setConn("lost", "再接続します…");
      scheduleReconnect();
    };

    ws.onerror = function () { /* onclose で拾う */ };
  }

  function scheduleReconnect() {
    retry = Math.min(retry + 1, 6);
    setTimeout(connect, 500 * retry);
  }

  // ---- 起動 ----------------------------------------------------------

  el("slider").addEventListener("input", function (e) {
    if (state.locked !== null) { setSlider(state.locked); return; }
    setSlider(Number(e.target.value));
  });

  Array.prototype.forEach.call(document.querySelectorAll("[data-delta]"), function (b) {
    b.addEventListener("click", function () {
      if (state.locked !== null) return;
      setSlider(state.answer + Number(b.getAttribute("data-delta")));
    });
  });

  el("lock-btn").addEventListener("click", lockAnswer);

  restore();
  setSlider(state.answer);
  renderBalloons();
  show("view-idle");
  connect();
})();
</script>
</body>
</html>
